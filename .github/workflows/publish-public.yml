name: Publish sanitized mirror to public repo

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure SSH for pushing to public repo
        shell: bash
        run: |
          set -e
          mkdir -p ~/.ssh
          echo "${{ secrets.PUBLIC_REPO_DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H github.com >> ~/.ssh/known_hosts

      - name: Validate required secrets
        shell: bash
        env:
          PUBLIC_REPO_SSH_URL: ${{ secrets.PUBLIC_REPO_SSH_URL }}
        run: |
          set -e
          if [ -z "${PUBLIC_REPO_SSH_URL}" ]; then
            echo "ERROR: PUBLIC_REPO_SSH_URL secret is missing or empty"
            exit 1
          fi

          if [ -z "${{ secrets.PUBLIC_REPO_DEPLOY_KEY }}" ]; then
            echo "ERROR: PUBLIC_REPO_DEPLOY_KEY secret is missing or empty"
            exit 1
          fi

      - name: Create sanitized export
        shell: bash
        run: |
          set -e

          # Remove internal docs from public mirror
          rm -f CLAUDE.md ENVIRONMENT.md PAYMENTS.md PLAN.md || true

          # Remove env files if any accidentally exist in repo
          rm -f .env .env.* || true

          # Remove private-only GitHub workflows from public mirror
          rm -rf .github/workflows || true

          # Optional future private-only folders:
          # rm -rf .claude/private private_docs || true

      - name: Commit sanitized state if needed
        shell: bash
        run: |
          set -e
          git config user.name "efferra-mirror-bot"
          git config user.email "efferra-mirror-bot@users.noreply.github.com"

          git add -A
          if git diff --cached --quiet; then
            echo "No sanitized changes to commit."
          else
            git commit -m "Public mirror update (sanitized)"
          fi

      - name: Push sanitized mirror to public repo
        shell: bash
        env:
          PUBLIC_REPO_SSH_URL: ${{ secrets.PUBLIC_REPO_SSH_URL }}
        run: |
          set -e

          git remote remove public 2>/dev/null || true
          git remote add public "${PUBLIC_REPO_SSH_URL}"

          echo "Configured remotes:"
          git remote -v

          git push --force public HEAD:main
